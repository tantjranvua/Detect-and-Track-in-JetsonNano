runtime:
  active_camera_profile: usb_webcam
  camera_index: 0
  camera_backend: auto
  camera_use_csi: false
  camera_flip_method: 0
  camera_gstreamer_pipeline: ""
  camera_profiles:
    usb_webcam:
      camera_index: 0
      camera_backend: v4l2
      camera_use_csi: false
      camera_flip_method: 0
      camera_gstreamer_pipeline: ""
    csi_camera:
      camera_index: 0
      camera_backend: gstreamer
      camera_use_csi: true
      camera_flip_method: 0
      camera_gstreamer_pipeline: ""
  width: 1280
  height: 720
  input_fps: 10
  display: true

detection:
  # TensorRT: đặt use_tensorrt=true trên Jetson sau khi đã chạy scripts/convert_to_trt.sh
  # File .engine chỉ tồn tại trên Jetson, KHÔNG commit vào git.
  use_tensorrt: false
  face_engine_path: "models/face_detector.engine"
  object_engine_path: "models/object_detector.engine"

  face_conf_threshold: 0.6
  face_nms_iou_threshold: 0.35
  face_recognize:
    enabled: true
    gallery_dir: data/face_gallery
    similarity_threshold: 0.75
    score_margin: 0.02
    min_face_size: 40
    reload_interval_sec: 2.0
    console_similarity_log_enabled: true
    console_similarity_log_interval_sec: 0.5
    capture_default_count: 40
    capture_cooldown_ms: 300
  object_conf_threshold: 0.5
  nms_iou_threshold: 0.4
  classes_allowlist: [cup, cell phone]

tracking:
  max_missing_frames: 15
  face_iou_match_threshold: 0.35
  face_box_smooth_alpha: 0.55
  identity_vote_window_frames: 2
  identity_vote_min_count: 1
  selected_priority: true

control:
  deadband_px: 15
  max_step_deg: 3
  timeout_sec: 1.5
  pan_pid: {kp: 0.012, ki: 0.0, kd: 0.004}
  tilt_pid: {kp: 0.010, ki: 0.0, kd: 0.003}

kpi:
  laptop_fps_min: 10
  jetson_fps_min: 25
  latency_ms_max: 400
  center_error_px_max: 200
